name: Publish to npm

# ─────────────────────────────────────────────────────────────────────────────
# Manual publish workflow — use when tags already exist but publish failed.
# Triggered manually from GitHub Actions UI.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - core
          - react

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm run build:all

      - name: Publish glasses-tryon-core
        if: inputs.package == 'all' || inputs.package == 'core'
        run: pnpm --filter glasses-tryon-core publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish glasses-tryon-react
        if: inputs.package == 'all' || inputs.package == 'react'
        run: pnpm --filter glasses-tryon-react publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
